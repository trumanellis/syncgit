name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Show versions
        run: |
          bash --version
          git --version
          python3 --version
      - name: Run test suite
        run: bash tests/run.sh
